name: Build FreeBSD Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'FreeBSD version (e.g., 15.0, 14.3, 13.5)'
        required: true
        default: '15.0'
      build_apps:
        description: 'Also build application images'
        required: false
        type: boolean
        default: false
  schedule:
    # Build weekly on Sunday at midnight
    - cron: '0 0 * * 0'
  push:
    paths:
      - 'images/*/Lochfile'
      - 'build-images.sh'
      - 'build-app-images.sh'
      - 'registry.json'

permissions:
  contents: write

jobs:
  build-base:
    name: Build Base Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['15.0', '14.3']

    steps:
      - uses: actions/checkout@v4

      - name: Build base images for FreeBSD ${{ matrix.version }}
        run: |
          chmod +x build-images.sh
          ./build-images.sh ${{ matrix.version }}

      - name: Upload base image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freebsd-${{ matrix.version }}-base
          path: |
            output/*.txz
            output/SHA256SUMS

  build-apps:
    name: Build App Images
    runs-on: ubuntu-latest
    needs: build-base
    if: github.event.inputs.build_apps == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Download base images
        uses: actions/download-artifact@v4
        with:
          name: freebsd-15.0-base
          path: output/

      - name: Extract base for app builds
        run: |
          mkdir -p build/minimal-15.0
          tar -xJf output/freebsd-15.0-minimal.txz -C build/minimal-15.0

      - name: Build application images
        run: |
          chmod +x build-app-images.sh
          sudo ./build-app-images.sh all

      - name: Upload app image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lochs-app-images
          path: output/*.txz

  validate:
    name: Validate Lochfiles
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate Lochfile syntax
        run: |
          echo "Validating Lochfiles..."
          errors=0
          for lochfile in images/*/Lochfile; do
            image=$(basename $(dirname "$lochfile"))
            echo "  Checking ${image}..."

            # Check required labels
            if ! grep -q 'LABEL maintainer=' "$lochfile"; then
              echo "    ERROR: Missing maintainer label"
              errors=$((errors + 1))
            fi
            if ! grep -q 'LABEL description=' "$lochfile"; then
              echo "    ERROR: Missing description label"
              errors=$((errors + 1))
            fi
            if ! grep -q 'LABEL version=' "$lochfile"; then
              echo "    ERROR: Missing version label"
              errors=$((errors + 1))
            fi

            # Check FROM directive
            if ! head -1 "$lochfile" | grep -q '^FROM '; then
              echo "    ERROR: Must start with FROM directive"
              errors=$((errors + 1))
            fi

            echo "    OK"
          done

          echo ""
          if [ $errors -gt 0 ]; then
            echo "Found ${errors} errors"
            exit 1
          fi
          echo "All Lochfiles valid."

      - name: Validate registry.json
        run: |
          echo "Validating registry.json..."
          python3 -c "import json; json.load(open('registry.json')); print('  Valid JSON')"

          # Check each image in registry has a Lochfile
          for img in $(python3 -c "
          import json
          data = json.load(open('registry.json'))
          for name in data['images']:
            if name != 'freebsd':
              print(name)
          "); do
            if [ -f "images/${img}/Lochfile" ]; then
              echo "  ${img}: Lochfile present"
            else
              echo "  ${img}: WARNING - no Lochfile found"
            fi
          done

  release:
    name: Create Release
    needs: [build-base, validate]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -name '*.txz' -exec cp {} release/ \;
          cd release
          sha256sum *.txz > SHA256SUMS
          cp ../registry.json .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Lochs Images - FreeBSD ${{ github.event.inputs.version }}
          body: |
            ## FreeBSD ${{ github.event.inputs.version }} Images for Lochs

            ### Base Images
            | Image | Size | Description |
            |-------|------|-------------|
            | `freebsd:${{ github.event.inputs.version }}` | ~163MB | Complete base system |
            | `freebsd:${{ github.event.inputs.version }}-minimal` | ~148MB | Stripped (no docs/debug) |
            | `freebsd:${{ github.event.inputs.version }}-rescue` | ~97MB | Bare minimum recovery |

            ### Usage
            ```bash
            lochs pull freebsd:${{ github.event.inputs.version }}-minimal
            lochs create myjail --image freebsd:${{ github.event.inputs.version }}-minimal
            lochs start myjail
            ```

            ### Checksums
            See `SHA256SUMS` file attached to this release.
          files: release/*
          draft: false
          prerelease: false
